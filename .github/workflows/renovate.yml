name: Renovate

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
      dryRun:
        description: "Dry run mode"
        required: false
        default: "disabled"
        type: choice
        options:
          - disabled
          - extract
          - lookup
          - full
  push:
    branches: [main]
    paths: [".github/renovate.json"]
  pull_request:
    paths: [".github/renovate.json", ".github/workflows/renovate.yml"]

# The workflow itself only needs read access. RENOVATE_TOKEN (PAT with repo+workflow
# scopes) provides write access for branch creation and PR management.
permissions:
  contents: read

jobs:
  validate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.22.2"

      - name: Validate Renovate config
        run: |
          npx --yes --package=renovate@43 -- \
            renovate-config-validator --strict --no-global .github/renovate.json

  renovate:
    needs: validate-config
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: renovatebot/github-action@eb932558ad942cccfd8211cf535f17ff183a9f74 # v46.1.9
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun == 'disabled' && 'null' || inputs.dryRun }}
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: .github/renovate.json
