name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: taiki-e/install-action@20da5cdf227efff4dd2ba3741c6bd144a8996a94 # cargo-deny
      - name: Check advisories and licenses
        run: cargo deny check --config .github/deny.toml
        env:
          RUSTC_WRAPPER: ""
