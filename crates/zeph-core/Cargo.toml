[package]
name = "zeph-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/zeph-core"
keywords.workspace = true
categories.workspace = true
description = "Core agent loop, configuration, context builder, metrics, and vault for Zeph"
readme = "README.md"

[features]
default = []
candle = ["zeph-llm/candle"]
cuda = ["zeph-llm/cuda"]
daemon = []
experiments = ["dep:ordered-float", "dep:rand", "zeph-memory/experiments"]
graph-memory = ["zeph-memory/graph-memory"]
index = ["dep:zeph-index"]
metal = ["zeph-llm/metal"]
lsp-context = []
mock = ["zeph-llm/mock", "zeph-memory/mock"]
orchestration = ["zeph-memory/orchestration"]

[dependencies]
age.workspace = true
anyhow.workspace = true
blake3.workspace = true
reqwest = { workspace = true, features = ["rustls"] }
futures.workspace = true
notify.workspace = true
notify-debouncer-mini.workspace = true
ordered-float = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
regex.workspace = true
schemars.workspace = true
dirs.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
base64.workspace = true
serde_norway.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["fs", "macros", "rt-multi-thread", "sync", "time"] }
tokio-util.workspace = true
tokio-stream.workspace = true
toml.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["v4", "serde"] }
tempfile.workspace = true
zeph-index = { workspace = true, optional = true }
zeph-llm.workspace = true
zeph-mcp.workspace = true
zeph-memory.workspace = true
zeph-skills.workspace = true
zeph-tools.workspace = true
zeroize.workspace = true

[[bench]]
name = "context_building"
harness = false

[dev-dependencies]
criterion.workspace = true
indoc.workspace = true
insta.workspace = true
proptest.workspace = true
schemars.workspace = true
serial_test.workspace = true
tempfile.workspace = true
zeph-llm = { workspace = true, features = ["mock"] }
zeph-memory = { workspace = true, features = ["mock"] }

[lints]
workspace = true
