[package]
name = "zeph-tools"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/zeph-tools"
keywords.workspace = true
categories.workspace = true
description = "Tool executor trait with shell, web scrape, and composite executors for Zeph"
readme = "README.md"

[dependencies]
glob.workspace = true
regex.workspace = true
reqwest = { workspace = true, features = ["rustls"] }
schemars.workspace = true
scrape-core.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["fs", "io-util", "macros", "process", "rt", "sync", "time"] }
toml.workspace = true
tokio-util.workspace = true
tracing.workspace = true
unicode-normalization.workspace = true
tree-sitter.workspace = true
url.workspace = true
zeph-index.workspace = true

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
toml.workspace = true
wiremock.workspace = true

[features]
policy-enforcer = []

[lints]
workspace = true
